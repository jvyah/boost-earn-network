kind = "web"
previewPath = "/"
title = "Boost & Earn"
version = "1.0.0"
id = "artifacts/boost-earn"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20733

[services.development]
run = "pnpm --filter @workspace/boost-earn run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/boost-earn", "run", "build" ]
publicDir = "artifacts/boost-earn/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20733"
BASE_PATH = "/"
